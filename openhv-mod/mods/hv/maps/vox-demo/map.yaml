Players:
	PlayerReference@Neutral:
		Name: Neutral
		OwnsWorld: True
		NonCombatant: True
		Faction: Random
	# Creeps owns the south base. Marked Bot: rogue so the Rogue AI runs
	# on it from world load without needing the lobby's slot_bot path
	# (Player.cs:190+202 — for map-player slots, BotType is read from
	# PlayerReference.Bot at world construction).
	PlayerReference@Creeps:
		Name: Creeps
		NonCombatant: False
		Faction: Random
		Color: FF3030
		Bot: rogue
		Enemies: Multi0
	PlayerReference@Multi0:
		Name: Multi0
		Playable: True
		Faction: Random
		Enemies: Creeps
	# Multi1 stays as a lobby slot for human-vs-human matches but is no
	# longer the owner of pre-placed south actors.
	PlayerReference@Multi1:
		Name: Multi1
		Playable: True
		Faction: Random
		Enemies: Creeps

